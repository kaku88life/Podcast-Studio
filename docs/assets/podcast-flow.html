<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<style>html,body{margin:0;padding:0;background:#ffffff;}</style>
</head>
<body>
<svg width="1100" height="1700" viewBox="0 0 1100 1700" xmlns="http://www.w3.org/2000/svg"
     font-family="'Microsoft JhengHei','Noto Sans TC','PingFang TC',sans-serif">
  <rect x="0" y="0" width="1100" height="1700" fill="#ffffff"/>

  <!-- Header -->
  <text x="64" y="76" font-size="44" font-weight="800" fill="#201f1c">我們的 Podcast 製作流程</text>
  <text x="66" y="122" font-size="25" fill="#5b5a54">用 AI 幫忙，不用出鏡、不怕卡詞，也能做出專業節目</text>

  <!-- Legend -->
  <rect x="66" y="150" width="20" height="20" rx="5" fill="#0F6E56"/>
  <text x="94" y="167" font-size="22" fill="#5b5a54">你們做</text>
  <rect x="210" y="150" width="20" height="20" rx="5" fill="#534AB7"/>
  <text x="238" y="167" font-size="22" fill="#5b5a54">AI 幫忙</text>
  <rect x="360" y="150" width="20" height="20" rx="5" fill="#854F0B"/>
  <text x="388" y="167" font-size="22" fill="#5b5a54">一起把關</text>

  <!-- Step 1 -->
  <rect x="60" y="210" width="980" height="150" rx="20" fill="#E1F5EE" stroke="#0F6E56" stroke-width="2"/>
  <circle cx="128" cy="285" r="34" fill="#0F6E56"/>
  <text x="128" y="285" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="central">1</text>
  <text x="192" y="272" font-size="33" font-weight="700" fill="#201f1c">想題目</text>
  <text x="192" y="316" font-size="24" fill="#4a4944">一起決定這集要聊什麼日本不動產主題</text>
  <rect x="836" y="262" width="184" height="46" rx="23" fill="#0F6E56"/>
  <text x="928" y="285" font-size="22" fill="#ffffff" text-anchor="middle" dominant-baseline="central">你們做</text>

  <line x1="120" y1="362" x2="120" y2="386" stroke="#C4C2B8" stroke-width="3"/>
  <polygon points="110,383 130,383 120,396" fill="#C4C2B8"/>

  <!-- Step 2 -->
  <rect x="60" y="394" width="980" height="150" rx="20" fill="#E1F5EE" stroke="#0F6E56" stroke-width="2"/>
  <circle cx="128" cy="469" r="34" fill="#0F6E56"/>
  <text x="128" y="469" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="central">2</text>
  <text x="192" y="456" font-size="33" font-weight="700" fill="#201f1c">輕鬆錄音</text>
  <text x="192" y="500" font-size="24" fill="#4a4944">兩個人自然聊天錄下來，不用背稿、不怕吃螺絲</text>
  <rect x="836" y="446" width="184" height="46" rx="23" fill="#0F6E56"/>
  <text x="928" y="469" font-size="22" fill="#ffffff" text-anchor="middle" dominant-baseline="central">你們做</text>

  <line x1="120" y1="546" x2="120" y2="570" stroke="#C4C2B8" stroke-width="3"/>
  <polygon points="110,567 130,567 120,580" fill="#C4C2B8"/>

  <!-- Step 3 -->
  <rect x="60" y="578" width="980" height="150" rx="20" fill="#FAEEDA" stroke="#854F0B" stroke-width="2"/>
  <circle cx="128" cy="653" r="34" fill="#854F0B"/>
  <text x="128" y="653" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="central">3</text>
  <text x="192" y="640" font-size="33" font-weight="700" fill="#201f1c">整理腳本</text>
  <text x="192" y="684" font-size="24" fill="#4a4944">AI 把聊天內容整理成順暢的對話稿，你們確認</text>
  <rect x="836" y="630" width="184" height="46" rx="23" fill="#854F0B"/>
  <text x="928" y="653" font-size="22" fill="#ffffff" text-anchor="middle" dominant-baseline="central">一起把關</text>

  <line x1="120" y1="730" x2="120" y2="754" stroke="#C4C2B8" stroke-width="3"/>
  <polygon points="110,751 130,751 120,764" fill="#C4C2B8"/>

  <!-- Step 4 -->
  <rect x="60" y="762" width="980" height="150" rx="20" fill="#EEEDFE" stroke="#534AB7" stroke-width="2"/>
  <circle cx="128" cy="837" r="34" fill="#534AB7"/>
  <text x="128" y="837" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="central">4</text>
  <text x="192" y="824" font-size="33" font-weight="700" fill="#201f1c">AI 配音</text>
  <text x="192" y="868" font-size="24" fill="#4a4944">用你們的「聲音分身」念稿，聲音是你們的、但不會卡詞</text>
  <rect x="836" y="814" width="184" height="46" rx="23" fill="#534AB7"/>
  <text x="928" y="837" font-size="22" fill="#ffffff" text-anchor="middle" dominant-baseline="central">AI 幫忙</text>

  <line x1="120" y1="914" x2="120" y2="938" stroke="#C4C2B8" stroke-width="3"/>
  <polygon points="110,935 130,935 120,948" fill="#C4C2B8"/>

  <!-- Step 5 -->
  <rect x="60" y="946" width="980" height="150" rx="20" fill="#EEEDFE" stroke="#534AB7" stroke-width="2"/>
  <circle cx="128" cy="1021" r="34" fill="#534AB7"/>
  <text x="128" y="1021" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="central">5</text>
  <text x="192" y="1008" font-size="33" font-weight="700" fill="#201f1c">做畫面</text>
  <text x="192" y="1052" font-size="24" fill="#4a4944">不用出鏡，把內容變成字卡、圖表、圖片的影片</text>
  <rect x="836" y="998" width="184" height="46" rx="23" fill="#534AB7"/>
  <text x="928" y="1021" font-size="22" fill="#ffffff" text-anchor="middle" dominant-baseline="central">AI 幫忙</text>

  <line x1="120" y1="1098" x2="120" y2="1122" stroke="#C4C2B8" stroke-width="3"/>
  <polygon points="110,1119 130,1119 120,1132" fill="#C4C2B8"/>

  <!-- Step 6 -->
  <rect x="60" y="1130" width="980" height="150" rx="20" fill="#FAEEDA" stroke="#854F0B" stroke-width="2"/>
  <circle cx="128" cy="1205" r="34" fill="#854F0B"/>
  <text x="128" y="1205" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="central">6</text>
  <text x="192" y="1192" font-size="33" font-weight="700" fill="#201f1c">組裝剪輯</text>
  <text x="192" y="1236" font-size="24" fill="#4a4944">把聲音和畫面組成完整影片，你們做最後確認</text>
  <rect x="836" y="1182" width="184" height="46" rx="23" fill="#854F0B"/>
  <text x="928" y="1205" font-size="22" fill="#ffffff" text-anchor="middle" dominant-baseline="central">一起把關</text>

  <line x1="120" y1="1282" x2="120" y2="1306" stroke="#C4C2B8" stroke-width="3"/>
  <polygon points="110,1303 130,1303 120,1316" fill="#C4C2B8"/>

  <!-- Step 7 -->
  <rect x="60" y="1314" width="980" height="150" rx="20" fill="#E1F5EE" stroke="#0F6E56" stroke-width="2"/>
  <circle cx="128" cy="1389" r="34" fill="#0F6E56"/>
  <text x="128" y="1389" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="central">7</text>
  <text x="192" y="1376" font-size="33" font-weight="700" fill="#201f1c">上架分享</text>
  <text x="192" y="1420" font-size="24" fill="#4a4944">發佈到 YouTube、Podcast 和社群</text>
  <rect x="836" y="1366" width="184" height="46" rx="23" fill="#0F6E56"/>
  <text x="928" y="1389" font-size="22" fill="#ffffff" text-anchor="middle" dominant-baseline="central">你們做</text>

  <!-- Footer note -->
  <rect x="60" y="1508" width="980" height="150" rx="20" fill="#F1EFE8"/>
  <text x="92" y="1566" font-size="29" font-weight="700" fill="#201f1c">你們只要：想主題、聊天、把關品質</text>
  <text x="92" y="1612" font-size="24" fill="#4a4944">耗時的整理、配音、做畫面，交給 AI 加速 —— 不用出鏡，也不怕卡詞。</text>
</svg>
</body>
</html>
