<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Podcast Studio 節目看板</title>
<style>
  :root{
    --bg:#ffffff; --surface:#faf9f5; --surface2:#f3f1ea;
    --text:#201f1c; --muted:#6b6a63; --hint:#97968d;
    --border:rgba(0,0,0,.12); --border2:rgba(0,0,0,.24);
    --info:#185FA5; --infobg:#E6F1FB;
    --radius:12px; --radius-sm:8px;
    --a:#185FA5; --b:#993556; --both:#0F6E56; --none:#888780;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--surface2); color:var(--text);
    font-family:system-ui,-apple-system,"Segoe UI","Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif;
    line-height:1.5; padding:0 0 calc(2rem + env(safe-area-inset-bottom));}
  .wrap{max-width:1280px; margin:0 auto; padding:1.2rem 1rem 0;}
  a{color:var(--info);}
  header h1{font-size:1.3rem; margin:0 0 .2rem;}
  header p{margin:.15rem 0; color:var(--muted); font-size:.85rem;}
  .nav{display:flex; gap:.5rem; margin:.5rem 0 .2rem; font-size:.82rem; flex-wrap:wrap;}
  .nav a{padding:.25rem .6rem; border:1px solid var(--border); border-radius:999px; text-decoration:none; background:var(--bg); color:var(--muted);}
  .nav a.here{background:var(--info); color:#fff; border-color:var(--info);}

  .bar{position:sticky; top:0; z-index:10; background:var(--surface2); padding:.6rem 0 .5rem; border-bottom:1px solid var(--border); margin-bottom:.7rem;}
  .bar-row{display:flex; align-items:center; gap:.7rem; flex-wrap:wrap;}
  .btn{font:inherit; font-size:.85rem; cursor:pointer; border:1px solid var(--border2); background:var(--bg); color:var(--text); border-radius:var(--radius-sm); padding:.4rem .8rem; min-height:36px;}
  .btn.primary{background:var(--info); color:#fff; border-color:var(--info);}
  .sync{font-size:.74rem; color:var(--hint); display:inline-flex; align-items:center; gap:.25rem;}
  .sync.on{color:#0F6E56;}
  .spacer{flex:1;}

  .board{display:flex; gap:.7rem; overflow-x:auto; padding-bottom:.6rem; -webkit-overflow-scrolling:touch; align-items:flex-start;}
  .col{flex:0 0 248px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); display:flex; flex-direction:column; max-height:78vh;}
  .colhd{display:flex; align-items:center; gap:.45rem; padding:.55rem .7rem; border-bottom:1px solid var(--border); position:sticky; top:0;}
  .colhd .cdot{width:9px; height:9px; border-radius:3px; flex:0 0 auto;}
  .colhd .cname{font-size:.85rem; font-weight:650;}
  .colhd .ccount{margin-left:auto; font-size:.72rem; color:var(--muted); background:var(--surface2); border:1px solid var(--border); border-radius:999px; padding:.05rem .45rem;}
  .cards{padding:.5rem; display:flex; flex-direction:column; gap:.5rem; overflow-y:auto;}
  .cempty{font-size:.74rem; color:var(--hint); text-align:center; padding:.8rem 0;}

  .card{background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm); padding:.55rem .6rem; border-left:3px solid var(--accent,var(--none));}
  .card-top{display:flex; align-items:center; gap:.4rem; margin-bottom:.25rem;}
  .epno{font-size:.7rem; font-weight:700; color:var(--muted); background:var(--surface2); border-radius:999px; padding:.05rem .45rem;}
  .own{font-size:.68rem; padding:.05rem .45rem; border-radius:999px; border:1px solid; margin-left:auto;}
  .own.o0{color:#5F5E5A; border-color:#B4B2A9; background:#F1EFE8;}
  .own.o1{color:#0C447C; border-color:#85B7EB; background:#E6F1FB;}
  .own.o2{color:#72243E; border-color:#ED93B1; background:#FBEAF0;}
  .own.o3{color:#0F6E56; border-color:#5DCAA5; background:#E1F5EE;}
  .card-title{font-size:.9rem; font-weight:600; line-height:1.35;}
  .card-hook{font-size:.76rem; color:var(--muted); margin-top:.2rem;}
  .card-meta{display:flex; flex-wrap:wrap; gap:.3rem .6rem; margin-top:.4rem; font-size:.72rem; color:var(--hint);}
  .card-meta a{font-size:.72rem;}
  .card-act{display:flex; align-items:center; gap:.35rem; margin-top:.5rem;}
  .card-act select{font:inherit; font-size:.72rem; padding:.2rem .3rem; border:1px solid var(--border); border-radius:6px; background:var(--surface); color:var(--text); flex:1; min-width:0;}
  .iconbtn{font:inherit; font-size:.72rem; cursor:pointer; border:1px solid var(--border); background:var(--bg); color:var(--muted); border-radius:6px; padding:.22rem .45rem;}

  /* modal */
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:center; justify-content:center; z-index:50; padding:1rem;}
  .overlay.show{display:flex;}
  .modal{background:var(--bg); border-radius:var(--radius); width:100%; max-width:460px; max-height:90vh; overflow-y:auto; padding:1rem 1.1rem;}
  .modal h2{font-size:1.05rem; margin:.1rem 0 .8rem;}
  .modal label{display:block; font-size:.78rem; color:var(--muted); margin:.6rem 0 .2rem;}
  .modal input, .modal select, .modal textarea{width:100%; font:inherit; font-size:16px; border:1px solid var(--border); border-radius:var(--radius-sm); padding:.45rem .55rem; background:var(--bg); color:var(--text);}
  .modal textarea{resize:vertical; min-height:60px;}
  .row2{display:flex; gap:.6rem;}
  .row2 > div{flex:1;}
  .modal-act{display:flex; gap:.5rem; margin-top:1rem; align-items:center;}
  .modal-act .spacer{flex:1;}
  .danger{color:#993C1D; border-color:#F0997B; background:#FAECE7;}

  .foot{font-size:.76rem; color:var(--hint); margin:1rem 0 0; line-height:1.6;}
  @media (max-width:560px){
    .col{flex-basis:82vw;}
    .row2{flex-direction:column; gap:0;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>節目看板</h1>
    <p>每一集從「選題」到「發佈」的進度都在這裡。八段狀態、雙人即時共編。</p>
    <nav class="nav">
      <a class="here" href="board.html">節目看板</a>
      <a href="tools-checklist.html">工具確認表</a>
      <a href="prep-checklist.html">資源準備清單</a>
    </nav>
  </header>

  <div class="bar">
    <div class="bar-row">
      <button class="btn primary" onclick="openNew()">＋ 新增一集</button>
      <span class="sync" id="sync">連線中…</span>
      <span class="spacer"></span>
      <span class="sync" id="stat"></span>
    </div>
  </div>

  <div class="board" id="board"></div>

  <p class="foot">
    用法：「＋新增一集」建立節目卡 → 卡片下方下拉選單可移動到下個階段 → 點「編輯」填標題/Hook/Owner/發佈日/腳本與成品連結。<br>
    八段狀態對應製作環節：選題池→企劃確認→腳本撰寫→錄製・語音→製作・剪輯→審核校對→已排程→已發佈。建議「審核」固定交給另一個人。
  </p>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="mTitle">新增一集</h2>
    <input type="hidden" id="mId">
    <div class="row2">
      <div><label>集號</label><input type="number" id="mEpNo" min="0" placeholder="如 1"></div>
      <div><label>狀態</label><select id="mStatus"></select></div>
    </div>
    <label>內部標題（工作用）</label>
    <input type="text" id="mTitleI" placeholder="例：日本買房稅制懶人包">
    <label>對外標題（發佈用，可後補）</label>
    <input type="text" id="mTitleP" placeholder="例：在日本買房，這些稅你一定要知道">
    <label>一句話 Hook</label>
    <input type="text" id="mHook" placeholder="這集最吸引人的一句話">
    <div class="row2">
      <div><label>Owner（負責人）</label><select id="mOwner"></select></div>
      <div><label>預計發佈日</label><input type="date" id="mPub"></div>
    </div>
    <label>腳本連結（Google Drive）</label>
    <input type="url" id="mScript" placeholder="https://...">
    <label>成品連結（影片/音檔）</label>
    <input type="url" id="mFinal" placeholder="https://...">
    <label>備註</label>
    <textarea id="mNote" placeholder="資料來源、待辦、提醒..."></textarea>
    <div class="modal-act">
      <button class="btn danger" id="mArchive" onclick="archiveCur()">封存</button>
      <span class="spacer"></span>
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="saveModal()">儲存</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL = "https://uwowizckfmekyobnzykv.supabase.co";
const SUPA_KEY = "sb_publishable_sfePZDxn5y4mXJkEOcpHoQ_5u_NZtbO";

const STATUS = ["選題池","企劃確認","腳本撰寫","錄製・語音","製作・剪輯","審核校對","已排程","已發佈"];
const SCOLOR = ["#888780","#7F77DD","#378ADD","#D4537E","#BA7517","#D85A30","#1D9E75","#639922"];
const OWNER  = ["未指派","主持人 A","主持人 B","共同"];

let eps = {};   // id -> episode
let sb = null;

function genId(){ return "ep_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }

function renderBoard(){
  const list = Object.values(eps).filter(e => !e.archived);
  let total = list.length;
  const board = document.getElementById("board");
  board.innerHTML = STATUS.map((sname, s) => {
    const items = list.filter(e => (e.status||0) === s)
      .sort((a,b) => ((a.ep_no??9999) - (b.ep_no??9999)) || ((a.created_at||"") < (b.created_at||"") ? -1 : 1));
    const cards = items.length
      ? items.map(cardHtml).join("")
      : `<div class="cempty">—</div>`;
    return `<div class="col">
      <div class="colhd"><span class="cdot" style="background:${SCOLOR[s]}"></span>
        <span class="cname">${sname}</span><span class="ccount">${items.length}</span></div>
      <div class="cards">${cards}</div>
    </div>`;
  }).join("");
  document.getElementById("stat").textContent = total + " 集進行中";
}
function cardHtml(e){
  const o = e.owner || 0;
  const meta = [];
  if(e.publish_date) meta.push(`<span>發佈 ${esc(e.publish_date)}</span>`);
  if(e.script_url) meta.push(`<a href="${esc(e.script_url)}" target="_blank" rel="noopener">腳本</a>`);
  if(e.final_url) meta.push(`<a href="${esc(e.final_url)}" target="_blank" rel="noopener">成品</a>`);
  const opts = STATUS.map((s,i) => `<option value="${i}" ${i===(e.status||0)?'selected':''}>${s}</option>`).join("");
  return `<div class="card" style="--accent:${SCOLOR[e.status||0]}">
    <div class="card-top">
      <span class="epno">${e.ep_no!=null?('EP'+e.ep_no):'未編號'}</span>
      <span class="own o${o}">${OWNER[o]}</span>
    </div>
    <div class="card-title">${esc(e.title_internal) || '<span style="color:var(--hint)">（未命名）</span>'}</div>
    ${e.hook?`<div class="card-hook">${esc(e.hook)}</div>`:''}
    ${meta.length?`<div class="card-meta">${meta.join("")}</div>`:''}
    <div class="card-act">
      <select onchange="moveStatus('${e.id}', this.value)" title="移動到">${opts}</select>
      <button class="iconbtn" onclick="openEdit('${e.id}')">編輯</button>
    </div>
  </div>`;
}

// ---- modal ----
function fillSelects(){
  document.getElementById("mStatus").innerHTML = STATUS.map((s,i)=>`<option value="${i}">${s}</option>`).join("");
  document.getElementById("mOwner").innerHTML = OWNER.map((o,i)=>`<option value="${i}">${o}</option>`).join("");
}
function openNew(){
  document.getElementById("mTitle").textContent = "新增一集";
  document.getElementById("mId").value = "";
  const nextNo = Object.values(eps).reduce((m,e)=>Math.max(m, e.ep_no??0), 0) + 1;
  document.getElementById("mEpNo").value = nextNo;
  document.getElementById("mStatus").value = "0";
  document.getElementById("mOwner").value = "0";
  ["mTitleI","mTitleP","mHook","mPub","mScript","mFinal","mNote"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("mArchive").style.display = "none";
  document.getElementById("overlay").classList.add("show");
}
function openEdit(id){
  const e = eps[id]; if(!e) return;
  document.getElementById("mTitle").textContent = "編輯節目";
  document.getElementById("mId").value = id;
  document.getElementById("mEpNo").value = e.ep_no ?? "";
  document.getElementById("mStatus").value = String(e.status||0);
  document.getElementById("mOwner").value = String(e.owner||0);
  document.getElementById("mTitleI").value = e.title_internal || "";
  document.getElementById("mTitleP").value = e.title_public || "";
  document.getElementById("mHook").value = e.hook || "";
  document.getElementById("mPub").value = e.publish_date || "";
  document.getElementById("mScript").value = e.script_url || "";
  document.getElementById("mFinal").value = e.final_url || "";
  document.getElementById("mNote").value = e.note || "";
  document.getElementById("mArchive").style.display = "";
  document.getElementById("overlay").classList.add("show");
}
function closeModal(){ document.getElementById("overlay").classList.remove("show"); }
function val(id){ return document.getElementById(id).value; }
function saveModal(){
  let id = val("mId");
  const isNew = !id;
  if(isNew) id = genId();
  const epNoRaw = val("mEpNo");
  const e = Object.assign({}, eps[id], {
    id: id,
    ep_no: epNoRaw === "" ? null : parseInt(epNoRaw, 10),
    status: parseInt(val("mStatus"), 10),
    owner: parseInt(val("mOwner"), 10),
    title_internal: val("mTitleI"), title_public: val("mTitleP"), hook: val("mHook"),
    publish_date: val("mPub") || null,
    script_url: val("mScript"), final_url: val("mFinal"), note: val("mNote"),
    archived: false,
  });
  if(isNew) e.created_at = new Date().toISOString();
  eps[id] = e; renderBoard(); push(id); closeModal();
}
function archiveCur(){
  const id = val("mId"); if(!id) return;
  if(!confirm("封存這一集？（會從看板隱藏，資料仍保留在資料庫）")) return;
  eps[id].archived = true; renderBoard(); push(id); closeModal();
}
function moveStatus(id, v){
  if(!eps[id]) return;
  eps[id].status = parseInt(v, 10); renderBoard(); push(id);
}

// ---- sync ----
function setSync(txt, on){ const el = document.getElementById("sync"); el.textContent = txt; el.className = "sync" + (on?" on":""); }
async function push(id){
  if(!sb) return;
  const e = eps[id];
  try{
    await sb.from("episodes").upsert({
      id: e.id, ep_no: e.ep_no, title_internal: e.title_internal||"", title_public: e.title_public||"",
      hook: e.hook||"", status: e.status||0, owner: e.owner||0, publish_date: e.publish_date||null,
      script_url: e.script_url||"", final_url: e.final_url||"", note: e.note||"",
      archived: !!e.archived, updated_at: new Date().toISOString()
    });
  }catch(err){}
}
async function initSync(){
  if(!window.supabase){ setSync("離線（僅本機，重整不保留）", false); return; }
  try{
    sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
    const { data, error } = await sb.from("episodes").select("*");
    if(error) throw error;
    (data||[]).forEach(r => { eps[r.id] = r; });
    renderBoard();
    sb.channel("episodes")
      .on("postgres_changes", { event: "*", schema: "public", table: "episodes" }, p => {
        const r = p.new; if(!r || !r.id) return;
        eps[r.id] = r; renderBoard();
      })
      .subscribe(st => { if(st === "SUBSCRIBED") setSync("● 即時同步中", true); });
  }catch(e){ setSync("離線（僅本機，重整不保留）", false); }
}

fillSelects();
renderBoard();
initSync();
document.getElementById("overlay").addEventListener("click", e => { if(e.target.id === "overlay") closeModal(); });
</script>
</body>
</html>
